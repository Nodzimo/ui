name: Release

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Create GitHub release
        run: gh release create ${{ github.ref_name }} --repo ${{ github.repository }} --generate-notes